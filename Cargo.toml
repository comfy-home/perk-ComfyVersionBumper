[package]
name = "comfy-version-bumper"
version = "0.3.6"
edition = "2024"
rust-version = "1.94"
description = "Ratatui public edition of the original Comfy Version Bumper"

[[bin]]
name = "cvb"
path = "src/main.rs"

[workspace]

[dependencies]
anyhow = "1"
arboard = "3"
chrono = { version = "0.4", default-features = false, features = ["clock"] }
crossterm = "0.29"
directories = "6"
image = { version = "0.25", default-features = false, features = ["png", "webp"] }
ratatui = "0.30"
ratatui-comfy-toaster = { path = "src/components/comfy-toaster" }
ratatui-explorer = "0.3"
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1", features = ["preserve_order"] }
toml = "1"
toml_edit = "0.25"
tui-textarea = "0.7"
tui-tabs = "0.1.1"
tui-overlay = "0.1.2"
